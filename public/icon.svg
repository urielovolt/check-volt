<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#1E1E1E"/>
      <stop offset="100%" stop-color="#080808"/>
    </linearGradient>
    <radialGradient id="orb" cx="50%" cy="42%" r="55%">
      <stop offset="0%" stop-color="#FB923C"/>
      <stop offset="100%" stop-color="#C2410C"/>
    </radialGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="108" fill="url(#bg)"/>

  <!-- Orange circle badge -->
  <circle cx="256" cy="244" r="168" fill="url(#orb)" filter="url(#glow)"/>

  <!-- Inner circle sheen (top-left highlight) -->
  <ellipse cx="210" cy="175" rx="80" ry="50" fill="white" opacity="0.12"/>

  <!-- White checkmark -->
  <path d="M 148 248 L 228 328 L 372 168"
        stroke="white"
        stroke-width="52"
        stroke-linecap="round"
        stroke-linejoin="round"
        fill="none"/>

  <!-- Lightning bolt — bottom right corner -->
  <g transform="translate(342, 360) scale(0.9)" opacity="0.92">
    <polygon points="28,0 8,46 22,46 0,88 46,38 32,38 54,0" fill="white"/>
  </g>
</svg>
